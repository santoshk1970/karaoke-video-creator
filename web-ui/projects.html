<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Karaoke Video Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-lg shadow-lg p-8 mb-6 text-white">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-4xl font-bold mb-2">🎵 Karaoke Video Creator</h1>
                        <p class="text-purple-100">Select a project or create a new one</p>
                    </div>
                    <button onclick="createNewProject()" 
                        class="bg-white text-purple-600 hover:bg-purple-50 font-bold py-3 px-6 rounded-lg shadow-lg transition transform hover:scale-105">
                        <i class="fas fa-plus mr-2"></i>Create New Project
                    </button>
                </div>
            </div>

            <!-- Projects Grid -->
            <div id="projectsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Projects will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-20">
                <div class="text-gray-400 mb-4">
                    <i class="fas fa-folder-open text-6xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-600 mb-2">No Projects Yet</h2>
                <p class="text-gray-500 mb-6">Create your first karaoke video project to get started</p>
                <button onclick="createNewProject()" 
                    class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition">
                    <i class="fas fa-plus mr-2"></i>Create New Project
                </button>
            </div>
        </div>
    </div>

    <script>
        async function loadProjects() {
            try {
                const response = await fetch('/api/list-projects');
                const result = await response.json();

                if (result.success && result.projects.length > 0) {
                    displayProjects(result.projects);
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function displayProjects(projects) {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = '';

            projects.forEach(project => {
                const card = createProjectCard(project);
                container.appendChild(card);
            });
        }

        function createProjectCard(project) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-lg p-6 hover:shadow-xl transition cursor-pointer';
            
            const hasTimingFiles = project.files.includes('lyrics-with-timing.txt');
            const hasImages = project.files.includes('output');
            const hasVideo = project.files.includes('output.mp4');
            
            let statusIcon = '⚪';
            let statusText = 'Not started';
            let statusColor = 'text-gray-500';
            
            if (hasVideo) {
                statusIcon = '✅';
                statusText = 'Complete';
                statusColor = 'text-green-600';
            } else if (hasImages) {
                statusIcon = '🎬';
                statusText = 'Ready for video';
                statusColor = 'text-blue-600';
            } else if (hasTimingFiles) {
                statusIcon = '📝';
                statusText = 'Timing complete';
                statusColor = 'text-yellow-600';
            }

            card.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1" onclick="openProject('${project.name}')">
                        <h3 class="text-xl font-bold text-gray-800 mb-1">${project.name}</h3>
                        <p class="text-sm text-gray-500">${project.created}</p>
                    </div>
                    <button onclick="deleteProject('${project.name}', event)" 
                        class="text-red-500 hover:text-red-700 p-2 rounded hover:bg-red-50 transition"
                        title="Delete project">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                
                <div onclick="openProject('${project.name}')" class="space-y-2">
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">Status:</span>
                        <span class="${statusColor} font-semibold">${statusIcon} ${statusText}</span>
                    </div>
                    
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">Files:</span>
                        <span class="text-gray-800">${project.files.length} items</span>
                    </div>
                    
                    ${project.lineCount ? `
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-gray-600">Lyrics:</span>
                        <span class="text-gray-800">${project.lineCount} lines</span>
                    </div>
                    ` : ''}
                </div>
                
                <div class="mt-4 pt-4 border-t border-gray-200">
                    <button onclick="openProject('${project.name}')" 
                        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                        <i class="fas fa-folder-open mr-2"></i>Open Project
                    </button>
                </div>
            `;

            return card;
        }

        function createNewProject() {
            window.location.href = '/create-project.html';
        }

        function openProject(projectName) {
            window.location.href = `/index.html?project=${encodeURIComponent(projectName)}`;
        }

        async function deleteProject(projectName, event) {
            event.stopPropagation();
            
            if (!confirm(`Are you sure you want to delete "${projectName}"?\n\nThis will permanently delete all files and cannot be undone.`)) {
                return;
            }

            try {
                const response = await fetch('/api/delete-project', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectName })
                });

                const result = await response.json();

                if (result.success) {
                    loadProjects(); // Reload the list
                } else {
                    alert('Error deleting project: ' + result.error);
                }
            } catch (error) {
                alert('Error deleting project: ' + error.message);
            }
        }

        // Load projects on page load
        loadProjects();
    </script>
</body>
</html>
