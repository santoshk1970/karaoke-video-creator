<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timing Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .project-name {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #10b981;
            color: white;
        }

        .btn-primary:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #6366f1;
            color: white;
        }

        .btn-secondary:hover {
            background: #4f46e5;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .content {
            padding: 32px;
        }

        .info-bar {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #6b7280;
        }

        .info-value {
            color: #111827;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9fafb;
            position: sticky;
            top: 0;
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 2px solid #e5e7eb;
        }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        tbody tr.changed {
            background: #fef3c7;
        }

        tbody tr.propagated {
            background: #dbeafe;
        }

        td {
            padding: 12px 16px;
        }

        .lyric-text {
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time-input {
            width: 100px;
            padding: 6px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .time-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .time-input.invalid {
            border-color: #ef4444;
        }

        .propagate-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .delta {
            font-size: 12px;
            color: #6366f1;
            font-weight: 500;
        }

        .delta.positive {
            color: #10b981;
        }

        .delta.negative {
            color: #ef4444;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>⏱️ Timing Editor</h1>
                <div class="project-name" id="projectName"></div>
            </div>
            <div class="actions">
                <button class="btn-primary" onclick="saveChanges()" id="saveBtn" disabled>Save Changes</button>
                <button class="btn-secondary" onclick="backToProject()">Back to Project</button>
            </div>
        </div>

        <div class="content">
            <div id="message"></div>

            <div class="info-bar" id="infoBar" style="display: none;">
                <div class="info-item">
                    <span class="info-label">Total Lyrics:</span>
                    <span class="info-value" id="totalLyrics">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Duration:</span>
                    <span class="info-value" id="duration">0:00</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Changes:</span>
                    <span class="info-value" id="changesCount">0</span>
                </div>
            </div>

            <!-- Workflow buttons -->
            <div id="workflowButtons" style="display: none; margin-bottom: 24px;">
                <div style="background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px;">
                    <h3 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: #0369a1;">
                        <i class="fas fa-info-circle" style="margin-right: 8px;"></i>After Saving Changes
                    </h3>
                    <p style="margin: 0 0 12px 0; font-size: 13px; color: #075985;">
                        Timing has been updated. Click below to regenerate images and video with the new timing.
                    </p>
                    <button class="btn-primary" onclick="regenerateAll()" id="btnRegenerateAll" style="width: 100%;">
                        <i class="fas fa-sync-alt" style="margin-right: 8px;"></i>Regenerate Images & Video
                    </button>
                </div>
            </div>

            <div id="loading" class="loading">
                Loading timing data...
            </div>

            <div class="table-container" id="tableContainer" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">#</th>
                            <th>Lyric</th>
                            <th style="width: 120px;">Time (s)</th>
                            <th style="width: 150px;">Propagate</th>
                        </tr>
                    </thead>
                    <tbody id="timingTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let projectName = '';
        let timingData = null;
        let changes = new Map();

        // Get project from URL
        const urlParams = new URLSearchParams(window.location.search);
        projectName = urlParams.get('project');

        if (!projectName) {
            showError('No project specified');
        } else {
            document.getElementById('projectName').textContent = projectName;
            loadTimingData();
        }

        async function loadTimingData() {
            try {
                const res = await fetch(`/api/get-timing-data?project=${encodeURIComponent(projectName)}`);
                const result = await res.json();

                if (!result.success) {
                    showError(result.error);
                    return;
                }

                timingData = result.data;
                renderTable();
                updateInfo();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('tableContainer').style.display = 'block';
                document.getElementById('infoBar').style.display = 'flex';
            } catch (error) {
                showError('Failed to load timing data: ' + error.message);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('timingTable');
            tbody.innerHTML = '';

            timingData.lyrics.forEach((lyric, index) => {
                const row = document.createElement('tr');
                row.id = `row-${index}`;

                // Index
                const indexCell = document.createElement('td');
                indexCell.textContent = index;
                row.appendChild(indexCell);

                // Lyric text
                const textCell = document.createElement('td');
                textCell.className = 'lyric-text';
                textCell.textContent = lyric.text;
                textCell.title = lyric.text;
                row.appendChild(textCell);

                // Time input
                const timeCell = document.createElement('td');
                const timeInput = document.createElement('input');
                timeInput.type = 'number';
                timeInput.step = '0.01';
                timeInput.className = 'time-input';
                timeInput.value = lyric.startTime.toFixed(2);
                timeInput.dataset.index = index;
                timeInput.dataset.original = lyric.startTime.toFixed(2);
                timeInput.addEventListener('input', () => handleTimeChange(index));
                timeCell.appendChild(timeInput);
                row.appendChild(timeCell);

                // Propagate checkbox
                const propagateCell = document.createElement('td');
                const propagateDiv = document.createElement('div');
                propagateDiv.className = 'propagate-cell';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'checkbox';
                checkbox.id = `propagate-${index}`;
                checkbox.dataset.index = index;
                checkbox.addEventListener('change', () => handlePropagateChange(index));

                const label = document.createElement('label');
                label.htmlFor = `propagate-${index}`;
                label.textContent = 'Propagate';

                const deltaSpan = document.createElement('span');
                deltaSpan.className = 'delta';
                deltaSpan.id = `delta-${index}`;

                propagateDiv.appendChild(checkbox);
                propagateDiv.appendChild(label);
                propagateDiv.appendChild(deltaSpan);
                propagateCell.appendChild(propagateDiv);
                row.appendChild(propagateCell);

                tbody.appendChild(row);
            });
        }

        function handleTimeChange(index) {
            const input = document.querySelector(`input[data-index="${index}"]`);
            const newTime = parseFloat(input.value);
            const originalTime = parseFloat(input.dataset.original);

            if (isNaN(newTime) || newTime < 0) {
                input.classList.add('invalid');
                return;
            }

            input.classList.remove('invalid');

            const delta = newTime - originalTime;
            const propagate = document.getElementById(`propagate-${index}`).checked;

            if (delta !== 0) {
                changes.set(index, { newTime, propagate, delta });
                updateRowStyle(index, true);
                updateDelta(index, delta);

                if (propagate) {
                    updatePropagatedRows(index, delta);
                }
            } else {
                changes.delete(index);
                updateRowStyle(index, false);
                updateDelta(index, 0);
            }

            updateChangesCount();
            document.getElementById('saveBtn').disabled = changes.size === 0;
        }

        function handlePropagateChange(index) {
            if (changes.has(index)) {
                const change = changes.get(index);
                change.propagate = document.getElementById(`propagate-${index}`).checked;
                changes.set(index, change);

                if (change.propagate) {
                    updatePropagatedRows(index, change.delta);
                } else {
                    clearPropagatedRows(index);
                }
            }
        }

        function updateRowStyle(index, isChanged) {
            const row = document.getElementById(`row-${index}`);
            if (isChanged) {
                row.classList.add('changed');
            } else {
                row.classList.remove('changed');
            }
        }

        function updateDelta(index, delta) {
            const deltaSpan = document.getElementById(`delta-${index}`);
            if (delta === 0) {
                deltaSpan.textContent = '';
            } else {
                const sign = delta > 0 ? '+' : '';
                deltaSpan.textContent = `${sign}${delta.toFixed(2)}s`;
                deltaSpan.className = delta > 0 ? 'delta positive' : 'delta negative';
            }
        }

        function updatePropagatedRows(index, delta) {
            for (let i = index + 1; i < timingData.lyrics.length; i++) {
                const row = document.getElementById(`row-${i}`);
                row.classList.add('propagated');

                const deltaSpan = document.getElementById(`delta-${i}`);
                const sign = delta > 0 ? '+' : '';
                deltaSpan.textContent = `(${sign}${delta.toFixed(2)}s)`;
                deltaSpan.className = delta > 0 ? 'delta positive' : 'delta negative';
            }
        }

        function clearPropagatedRows(index) {
            for (let i = index + 1; i < timingData.lyrics.length; i++) {
                const row = document.getElementById(`row-${i}`);
                row.classList.remove('propagated');

                const deltaSpan = document.getElementById(`delta-${i}`);
                deltaSpan.textContent = '';
            }
        }

        function updateChangesCount() {
            document.getElementById('changesCount').textContent = changes.size;
        }

        function updateInfo() {
            document.getElementById('totalLyrics').textContent = timingData.lyrics.length;
            const duration = timingData.metadata.duration;
            const minutes = Math.floor(duration / 60);
            const seconds = Math.floor(duration % 60);
            document.getElementById('duration').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        async function saveChanges() {
            if (changes.size === 0) return;

            const updates = Array.from(changes.entries()).map(([index, change]) => ({
                index: parseInt(index),
                newStartTime: change.newTime,
                propagate: change.propagate
            }));

            try {
                document.getElementById('saveBtn').disabled = true;
                document.getElementById('saveBtn').textContent = 'Saving...';

                const res = await fetch('/api/update-timing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: projectName, updates })
                });

                const result = await res.json();

                if (result.success) {
                    showSuccess(`Successfully updated ${result.updatedCount} timing(s). Regenerate images and video to see changes.`);
                    changes.clear();
                    updateChangesCount();
                    loadTimingData(); // Reload to show updated times

                    // Show workflow buttons
                    document.getElementById('workflowButtons').style.display = 'block';
                } else {
                    showError('Failed to save: ' + result.error);
                    document.getElementById('saveBtn').disabled = false;
                    document.getElementById('saveBtn').textContent = 'Save Changes';
                }
            } catch (error) {
                showError('Failed to save: ' + error.message);
                document.getElementById('saveBtn').disabled = false;
                document.getElementById('saveBtn').textContent = 'Save Changes';
            }
        }

        function backToProject() {
            window.location.href = `/?project=${encodeURIComponent(projectName)}`;
        }

        async function regenerateAll() {
            try {
                const btn = document.getElementById('btnRegenerateAll');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i>Regenerating...';

                // Step 1: Delete old images
                showSuccess('Step 1/3: Deleting old images...');
                await fetch('/api/delete-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project: projectName })
                });

                // Step 2: Generate new images
                showSuccess('Step 2/3: Generating new images...');
                const imgRes = await fetch('/api/generate-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectPath: projectName })
                });

                if (!imgRes.ok) {
                    throw new Error('Failed to regenerate images');
                }

                // Step 3: Generate video
                showSuccess('Step 3/3: Generating video...');
                const vidRes = await fetch('/api/create-video', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        projectPath: projectName,
                        purge: false,
                        videoType: 'singalong'
                    })
                });

                if (!vidRes.ok) {
                    throw new Error('Failed to regenerate video');
                }

                showSuccess('✅ All done! Images and video regenerated successfully. You can now play the video from the main UI.');
                btn.innerHTML = '<i class="fas fa-check" style="margin-right: 8px;"></i>Regenerate Images & Video';
                btn.disabled = false;
            } catch (error) {
                showError('Failed to regenerate: ' + error.message);
                const btn = document.getElementById('btnRegenerateAll');
                btn.innerHTML = '<i class="fas fa-sync-alt" style="margin-right: 8px;"></i>Regenerate Images & Video';
                btn.disabled = false;
            }
        }

        function showError(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'error';
            messageDiv.textContent = '❌ ' + message;
            messageDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'success';
            messageDiv.textContent = '✅ ' + message;
            messageDiv.style.display = 'block';

            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>

</html>
